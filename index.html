<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anywhere Anytime Digital Tree Ceremony</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #000;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* กรอบอัตราส่วน 16:9 สำหรับจอโปรเจกเตอร์ */
        #app-container {
            position: relative;
            width: 100%;
            max-width: 177.78vh; 
            height: 56.25vw;
            max-height: 100vh;
            background-color: #050a15;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .glow-text {
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .seed-btn {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            pointer-events: auto;
        }

        .seed-btn:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.9));
        }

        .seed-btn:active {
            transform: scale(0.9);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .final-title-container {
            animation: fadeInScale 1.5s ease-out forwards;
        }

        /* ปุ่มควบคุมเสียง */
        .audio-control {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
            pointer-events: auto;
        }
        .audio-control:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- แหล่งที่มาของเสียงประกอบ -->
        <!-- เพลงพื้นหลังแนวสร้างแรงบันดาลใจ -->
        <audio id="bg-music" loop>
            <source src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3" type="audio/mpeg">
        </audio>
        <!-- เสียงตอนเริ่มสัมผัสเมล็ดพันธุ์ -->
        <audio id="sfx-activate">
            <source src="https://assets.mixkit.co/sfx/preview/mixkit-magic-marimba-2820.mp3" type="audio/mpeg">
        </audio>
        <!-- เสียงฉลองตอนจบ (Climax) -->
        <audio id="sfx-success">
            <source src="https://assets.mixkit.co/sfx/preview/mixkit-stardust-fanfare-sound-2461.mp3" type="audio/mpeg">
        </audio>

        <!-- ปุ่มเปิด/ปิดเสียง (แนะนำให้กด Unmute ก่อนเริ่มพิธี) -->
        <div id="mute-toggle" class="audio-control text-white" title="เปิด/ปิดเสียง">
            <svg id="icon-unmute" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            <svg id="icon-mute" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 13.88l2.88 2.88L15 20V5l-1.88 1.88"></path><path d="M17.63 17.63a7.5 7.5 0 0 0 0-11.26"></path></svg>
        </div>

        <!-- หน้าแรก (ก่อนเริ่มงาน) -->
        <div id="ui-overlay" class="absolute inset-0 flex flex-col items-center justify-between p-12 pointer-events-none z-10">
            <div class="text-center">
                <h2 class="text-xl md:text-2xl font-light tracking-[0.2em] mb-2 text-white">โรงเรียนนาดูนประชาสรรพ์</h2>
                <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold glow-text text-white">Anywhere Anytime 2026</h1>
            </div>

            <div id="seed-container" class="pointer-events-auto flex flex-col items-center">
                <div id="seed" class="seed-btn w-24 h-24 md:w-32 md:h-32 bg-gradient-to-b from-yellow-300 to-yellow-600 rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(255,215,0,0.5)]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20M5.07 5.07l13.86 13.86M18.93 5.07L5.07 18.93"/></svg>
                </div>
                <p class="mt-8 text-xl md:text-2xl tracking-widest animate-pulse font-light text-white">ประธานสัมผัสเพื่อ "เปิดการอบรม"</p>
            </div>

            <div class="text-center text-white text-lg md:text-xl font-light tracking-wide">
                <p>สอนสนุก เรียนสบาย ได้ทุกที่ทุกเวลา ปีการศึกษา ๒๕๖๘</p>
            </div>
        </div>

        <!-- หน้าผลสำเร็จ ( Climax ) -->
        <div id="success-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-md hidden z-50 flex items-center justify-center text-center">
            <div class="final-title-container px-4 w-full">
                <h1 class="text-4xl md:text-7xl lg:text-8xl font-extrabold text-yellow-400 glow-text mb-8 whitespace-nowrap">
                    เปิดการอบรมอย่างเป็นทางการ
                </h1>
                <p class="text-2xl md:text-4xl text-white opacity-90 font-light tracking-widest mb-12">
                    ๓๐ มีนาคม ๒๕๖๙
                </p>
                <button onclick="location.reload()" class="px-8 py-3 bg-white/10 border border-white/20 rounded-full hover:bg-white/20 transition-all pointer-events-auto text-gray-300 hover:text-white">
                    เริ่มต้นใหม่
                </button>
            </div>
        </div>

        <canvas id="treeCanvas"></canvas>
    </div>

    <script>
        const container = document.getElementById('app-container');
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bg-music');
        const sfxActivate = document.getElementById('sfx-activate');
        const sfxSuccess = document.getElementById('sfx-success');
        
        let width, height;
        let branches = [];
        let particles = [];
        let isAnimating = false;
        let isMuted = true;
        let successSoundPlayed = false;
        const maxLevel = 8;

        // ระบบควบคุมเสียง
        document.getElementById('mute-toggle').addEventListener('click', () => {
            isMuted = !isMuted;
            bgMusic.muted = isMuted;
            sfxActivate.muted = isMuted;
            sfxSuccess.muted = isMuted;
            document.getElementById('icon-mute').classList.toggle('hidden', !isMuted);
            document.getElementById('icon-unmute').classList.toggle('hidden', isMuted);
            
            // เพื่อหลีกเลี่ยงข้อจำกัดการเล่นอัตโนมัติของเบราว์เซอร์
            if(!isMuted) {
                // เล่นเสียงเงียบๆ ไว้ก่อนเพื่อให้ Audio Context ทำงาน
                bgMusic.play().then(() => {
                    if(!isAnimating) bgMusic.pause();
                }).catch(() => {});
            }
        });

        function resize() {
            const rect = container.getBoundingClientRect();
            width = canvas.width = rect.width;
            height = canvas.height = rect.height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Branch {
            constructor(startX, startY, endX, endY, level, angle) {
                this.startX = startX;
                this.startY = startY;
                this.endX = endX;
                this.endY = endY;
                this.level = level;
                this.angle = angle;
                this.progress = 0;
                this.speed = 0.015 + (Math.random() * 0.015);
                this.finished = false;
            }

            draw() {
                const currentX = this.startX + (this.endX - this.startX) * this.progress;
                const currentY = this.startY + (this.endY - this.startY) * this.progress;

                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.lineTo(currentX, currentY);
                
                const opacity = 1 - (this.level / (maxLevel + 1));
                ctx.strokeStyle = `rgba(255, 215, 0, ${opacity})`;
                ctx.lineWidth = (maxLevel - this.level) * 2.5 + 1;
                ctx.lineCap = 'round';
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255, 215, 0, 0.4)';
                ctx.stroke();
                ctx.shadowBlur = 0;

                if (this.progress < 1) {
                    this.progress += this.speed;
                } else if (!this.finished) {
                    this.finished = true;
                    this.split();
                }
            }

            split() {
                if (this.level >= maxLevel) {
                    for(let i=0; i<5; i++) {
                        particles.push(new Leaf(this.endX, this.endY));
                    }
                    return;
                }

                const subBranches = 2 + Math.floor(Math.random() * 2);
                for (let i = 0; i < subBranches; i++) {
                    const nextLen = (Math.random() * 0.65 + 0.3) * (height / 5) * (1 - this.level/maxLevel);
                    const nextAngle = this.angle + (Math.random() * 60 - 30);
                    const rad = (nextAngle - 90) * Math.PI / 180;
                    const nextX = this.endX + Math.cos(rad) * nextLen;
                    const nextY = this.endY + Math.sin(rad) * nextLen;

                    branches.push(new Branch(this.endX, this.endY, nextX, nextY, this.level + 1, nextAngle));
                }
            }
        }

        class Leaf {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.size = Math.random() * 6 + 2;
                this.alpha = 1;
                this.color = Math.random() > 0.4 ? '#FFD700' : '#4DEEE1'; 
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.004;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 10, 21, 0.2)';
            ctx.fillRect(0, 0, width, height);

            branches.forEach(b => b.draw());
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            const activeBranches = branches.filter(b => !b.finished || b.progress < 1);
            if (isAnimating && branches.length > 0 && activeBranches.length === 0 && particles.length === 0) {
                const overlay = document.getElementById('success-overlay');
                if(overlay.classList.contains('hidden')) {
                    overlay.classList.remove('hidden');
                    overlay.classList.add('flex');
                    
                    // เล่นเสียงความสำเร็จเพียงครั้งเดียว
                    if(!successSoundPlayed && !isMuted) {
                        sfxSuccess.play();
                        successSoundPlayed = true;
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        document.getElementById('seed').addEventListener('click', () => {
            if (isAnimating) return;
            isAnimating = true;
            document.getElementById('seed-container').style.display = 'none';
            
            // เริ่มต้นวาดต้นไม้
            branches.push(new Branch(width / 2, height, width / 2, height - (height * 0.25), 0, 0));
            
            // เล่นเสียงประกอบ
            if(!isMuted) {
                bgMusic.play().catch(() => {});
                sfxActivate.play().catch(() => {});
            }
        });

        // เริ่มต้นแอนิเมชันลูป
        animate();
    </script>
</body>
</html>
